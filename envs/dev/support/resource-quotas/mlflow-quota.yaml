# ResourceQuota: mlflow-dev
# MLflow: requests 500m/2Gi, limits 1CPU/4Gi (1 replica)
# Headroom x2 for rolling updates and short-lived debug pods
apiVersion: v1
kind: ResourceQuota
metadata:
  name: mlflow-quota
  namespace: mlflow-dev
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 8Gi
    limits.cpu: "3"
    limits.memory: 12Gi
    pods: "4"
    persistentvolumeclaims: "2"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: mlflow-limits
  namespace: mlflow-dev
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: 4Gi
      defaultRequest:
        cpu: 500m
        memory: 2Gi
