# NetworkPolicy: Airflow 웹서버 인그레스 제한
# W7: Airflow UI는 Ingress와 Prometheus에서만 접근 가능
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: airflow-webserver-allow-internal
  namespace: airflow-dev
spec:
  podSelector:
    matchLabels:
      component: webserver
  policyTypes:
    - Ingress
  ingress:
    # Ingress controller → Airflow Web UI
    # ingress-nginx는 hostNetwork 사용 → namespaceSelector 미적용
    # IPIP 터널에서 소스 IP는 tunl0 주소(Pod CIDR 게이트웨이)이므로 ipBlock으로 허용
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - ipBlock:
            cidr: 192.168.194.64/32
        - ipBlock:
            cidr: 192.168.126.0/32
      ports:
        - protocol: TCP
          port: 8080
    # Prometheus → Airflow metrics 스크랩
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring-dev
      ports:
        - protocol: TCP
          port: 8080
