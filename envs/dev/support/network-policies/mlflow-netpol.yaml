# NetworkPolicy: MLflow 서비스 인그레스 제한
# MLflow는 Airflow, FastAPI, Ingress에서 접근 가능
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mlflow-allow-internal
  namespace: mlflow-dev
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mlflow
  policyTypes:
    - Ingress
  ingress:
    # Airflow → MLflow tracking/registry API
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: airflow-dev
      ports:
        - protocol: TCP
          port: 5000
    # FastAPI → MLflow metadata lookup (reload endpoint)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: fastapi-dev
      ports:
        - protocol: TCP
          port: 5000
    # Ingress controller → MLflow UI
    # namespaceSelector는 hostNetwork Pod에 적용되지 않으므로 ipBlock 필요
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - ipBlock:
            cidr: 192.168.18.0/24
      ports:
        - protocol: TCP
          port: 5000
