replicaCount: 2

image:
  tag: v1.5.4
  pullPolicy: Always
service:
  name: fastapi-dev-service
  port: 80
  type: ClusterIP
ingresses:
  - name: fastapi-local
    host: fastapi.local
    className: nginx
    whitelist: 192.168.18.0/24
    paths:
      - path: /
        pathType: Prefix
    tls:
      enabled: true
      secretName: fastapi-dev-tls
      issuerName: selfsigned-issuer
      createCertificate: true
    excludeMetrics: true
env:
  MLFLOW_HTTP_REQUEST_TIMEOUT: "10"
  MLFLOW_TRACKING_URI: "http://mlflow-dev-service.mlflow-dev.svc.cluster.local:5000"
  MODEL_NAME: "best_model"
  LOG_TO_STDOUT: "true"
  LOG_LEVEL: "info"
  TRITON_HTTP_URL: "http://triton.triton-dev.svc.cluster.local:8000"
  TRITON_MODEL_NAME: "best_model"

  # -----------------------------
  # Traffic Control (dev vs shadow)
  # -----------------------------
  TRAFFIC_MODE: "split"              # off | mirror | split
  TRAFFIC_SHADOW_PERCENT: "10"        # 0~100

  # dev/shadow Triton endpoints (명시)
  TRITON_HTTP_URL_PROD: "http://triton.triton-dev.svc.cluster.local:8000"
  TRITON_HTTP_URL_SHADOW: "http://triton.triton-dev.svc.cluster.local:8000"

envFrom:
  - secretRef:
      name: aws-credentials-secret
  - secretRef:
      name: fastapi-token-dev-secret
  - secretRef:
      name: slack-webhook-dev-secret
monitoring:
  releaseLabel: monitoring-dev
