# NetworkPolicy: Triton 서비스 인그레스 제한
# Triton은 FastAPI와 Airflow에서만 접근 가능
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: triton-allow-internal
  namespace: triton-prod
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: triton
  policyTypes:
    - Ingress
  ingress:
    # FastAPI → Triton gRPC/HTTP 추론 요청
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: fastapi-prod
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8001
    # Airflow → Triton model control API (load/unload/ready)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: airflow-prod
      ports:
        - protocol: TCP
          port: 8000
    # Prometheus → Triton metrics 스크랩
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring-prod
      ports:
        - protocol: TCP
          port: 8002
