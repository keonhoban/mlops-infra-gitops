# NetworkPolicy: FastAPI 서비스 인그레스 제한
# W7: FastAPI는 Ingress, Airflow, Prometheus에서만 접근 가능
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fastapi-allow-internal
  namespace: fastapi-prod
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: fastapi
  policyTypes:
    - Ingress
  ingress:
    # Ingress controller → FastAPI HTTP 요청
    # ingress-nginx는 hostNetwork 사용 → namespaceSelector 미적용
    # IPIP 터널에서 소스 IP는 tunl0 주소(Pod CIDR 게이트웨이)이므로 ipBlock으로 허용
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - ipBlock:
            cidr: 192.168.194.64/32
        - ipBlock:
            cidr: 192.168.126.0/32
      ports:
        - protocol: TCP
          port: 8000
    # Airflow → FastAPI reload API (/variant/{alias}/reload)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: airflow-prod
      ports:
        - protocol: TCP
          port: 8000
    # Prometheus → FastAPI metrics 스크랩 (/metrics)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring-prod
      ports:
        - protocol: TCP
          port: 8000
