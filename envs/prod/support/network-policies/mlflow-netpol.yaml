# NetworkPolicy: MLflow 서비스 인그레스 제한
# MLflow는 Airflow, FastAPI, Ingress에서 접근 가능
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mlflow-allow-internal
  namespace: mlflow-prod
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mlflow
  policyTypes:
    - Ingress
  ingress:
    # Airflow → MLflow tracking/registry API
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: airflow-prod
      ports:
        - protocol: TCP
          port: 5000
    # FastAPI → MLflow metadata lookup (reload endpoint)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: fastapi-prod
      ports:
        - protocol: TCP
          port: 5000
    # Ingress controller → MLflow UI
    # ingress-nginx는 hostNetwork 사용 → namespaceSelector 미적용
    # IPIP 터널에서 소스 IP는 tunl0 주소(Pod CIDR 게이트웨이)이므로 ipBlock으로 허용
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - ipBlock:
            cidr: 192.168.194.64/32
        - ipBlock:
            cidr: 192.168.126.0/32
      ports:
        - protocol: TCP
          port: 5000
