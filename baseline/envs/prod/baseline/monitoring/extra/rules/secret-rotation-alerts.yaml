apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: secret-rotation-alerts
  namespace: monitoring-prod
  labels:
    release: monitoring-prod
spec:
  groups:
    - name: secret-rotation.rules
      rules:
        - alert: SealedSecretControllerDown
          expr: |
            up{job="sealed-secrets-controller"} == 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "SealedSecrets controller unreachable for 30m — possible cert expiry or crash"
            description: "Check controller logs and cert expiry with: kubeseal --fetch-cert"

        - alert: SealedSecretUnsealErrors
          expr: |
            rate(sealed_secrets_controller_unseal_errors_total[15m]) > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "SealedSecrets unseal errors detected — cert may be expired or rotated"
            description: "Unseal error rate: {{ $value | printf \"%.2f\" }}/sec. Run: make rotate-ss-key && make reseal-prod"
