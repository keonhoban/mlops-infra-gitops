name: Helm CI

on:
  pull_request:
    paths:
      - 'charts/**'
      - 'envs/**'
      - 'apps/**'
      - 'baseline/**'
      - 'optional/**'
      - 'bootstrap/**'
      - '.github/workflows/ci-helm-validate.yaml'
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: '0 9 * * 1'  # 매주 월요일 09:00 UTC — Helm/K8s 스키마 드리프트 감지
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: helm-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint & Render & Validate (${{ matrix.env }} / ${{ matrix.chart }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, prod]
        chart: [airflow, fastapi, mlflow, triton]

    env:
      KUBE_VERSION: "1.30.0"
      # 3rd-party kinds는 스키마 검증에서 스킵
      SKIP_KINDS: "Application,ApplicationSet,AppProject,SealedSecret,Certificate,CertificateRequest,Issuer,ClusterIssuer,Order,Challenge"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm (match local)
        uses: azure/setup-helm@v4
        with:
          version: v3.18.3

      - name: Install tools (yamllint, kubeconform)
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y yamllint
          curl -sSL -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          sudo tar -C /usr/local/bin -xzf kubeconform.tar.gz kubeconform
          kubeconform -v

      - name: YAML style check (repo-wide)
        shell: bash
        run: |
          set -euo pipefail
          git ls-files -z '*.yml' '*.yaml' \
            ':!:charts/**/templates/**' \
            ':!:charts/**/charts/**' \
            ':!:baseline/charts/**/templates/**' \
            ':!:baseline/charts/**/charts/**' \
            ':!:optional/charts/**/templates/**' \
            ':!:optional/charts/**/charts/**' \
            ':!:envs/**/sealed-secrets/**' \
            ':!:baseline/envs/**/sealed-secrets/**' \
            ':!:optional/envs/**/sealed-secrets/**' \
            ':!:bootstrap/notifications/secret-sealed.yaml' \
            ':!:docs/proof/**' \
          | xargs -0 -r yamllint -s

      - name: Helm lint (strict)
        working-directory: charts/${{ matrix.chart }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f values/base.yaml && -f values/${{ matrix.env }}.yaml ]]; then
            helm lint . -f values/base.yaml -f values/${{ matrix.env }}.yaml --strict
          elif [[ -f values/${{ matrix.env }}.yaml ]]; then
            helm lint . -f values/${{ matrix.env }}.yaml --strict
          else
            helm lint . --strict
          fi

      - name: Render manifests with helm template
        id: render
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/rendered
          CHART="charts/${{ matrix.chart }}"
          OUT="/tmp/rendered/${{ matrix.chart }}-${{ matrix.env }}.yaml"
          NS="${{ matrix.chart }}-${{ matrix.env }}"

          if [[ -f "$CHART/values/base.yaml" && -f "$CHART/values/${{ matrix.env }}.yaml" ]]; then
            helm template ${{ matrix.chart }} "$CHART" -n "$NS" \
              -f "$CHART/values/base.yaml" -f "$CHART/values/${{ matrix.env }}.yaml" > "$OUT"
          elif [[ -f "$CHART/values/${{ matrix.env }}.yaml" ]]; then
            helm template ${{ matrix.chart }} "$CHART" -n "$NS" \
              -f "$CHART/values/${{ matrix.env }}.yaml" > "$OUT"
          else
            helm template ${{ matrix.chart }} "$CHART" -n "$NS" > "$OUT"
          fi

          echo "out=$OUT" >> "$GITHUB_OUTPUT"
          test -s "$OUT"

      - name: kubeconform (rendered core chart manifests only)
        shell: bash
        run: |
          set -euo pipefail
          kubeconform \
            -kubernetes-version "${KUBE_VERSION}" \
            -ignore-missing-schemas \
            -skip "${SKIP_KINDS}" \
            -summary \
            "${{ steps.render.outputs.out }}"

      - name: Validate env raw manifests (envs/${{ matrix.env }})
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail

          # 1) env 하위 YAML 스타일 검사
          mapfile -t YAML_FILES < <(
            find "envs/${{ matrix.env }}" -type f -name '*.yaml' \
              ! -path "*/sealed-secrets/*" \
              | sort
          )

          if (( ${#YAML_FILES[@]} )); then
            echo "YAML lint: ${#YAML_FILES[@]} files under envs/${{ matrix.env }}"
            yamllint -s "${YAML_FILES[@]}"
          else
            echo "No YAML files found under envs/${{ matrix.env }}"
          fi

          # 2) 실제 Kubernetes manifest만 kubeconform 검사
          mapfile -t MANIFEST_FILES < <(
            find "envs/${{ matrix.env }}" -type f -name '*.yaml' \
              ! -path "*/sealed-secrets/*" \
              ! -name 'values.yaml' \
              ! -name 'kustomization.yaml' \
              | sort
          )

          if (( ${#MANIFEST_FILES[@]} )); then
            echo "Kubeconform: ${#MANIFEST_FILES[@]} manifest files under envs/${{ matrix.env }}"
            kubeconform \
              -kubernetes-version "${KUBE_VERSION}" \
              -ignore-missing-schemas \
              -skip "${SKIP_KINDS}" \
              -summary \
              "${MANIFEST_FILES[@]}"
          else
            echo "No manifest files found under envs/${{ matrix.env }}"
          fi

      - name: Validate apps/ (Argo CD objects etc.)
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          FILES=(apps/*.yaml)
          if (( ${#FILES[@]} )); then
            echo "Validating ${#FILES[@]} files under apps/"
            yamllint -s "${FILES[@]}"
            kubeconform \
              -kubernetes-version "${KUBE_VERSION}" \
              -ignore-missing-schemas \
              -skip "${SKIP_KINDS}" \
              -summary \
              "${FILES[@]}"
          else
            echo "No files under apps/"
          fi

      - name: Upload rendered manifests
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: rendered-${{ matrix.chart }}-${{ matrix.env }}
          path: /tmp/rendered/${{ matrix.chart }}-${{ matrix.env }}.yaml
          if-no-files-found: warn
