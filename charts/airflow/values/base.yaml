airflow:
  executor: KubernetesExecutor

  images:
    airflow:
      repository: hoizz/airflow-custom
      pullPolicy: IfNotPresent

  config:
    AIRFLOW__CORE__LOAD_EXAMPLES: { value: "False" }
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: { value: "False" }
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: { value: "True" }

  postgresql:
    enabled: false

  triggerer:
    persistence:
      enabled: false

  metrics:
    enabled: true
    prometheus:
      port: 8793
  serviceMonitor:
    enabled: true
    interval: 30s
