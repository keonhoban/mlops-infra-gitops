apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton
  labels:
{{ include "triton.labels" . | nindent 4 }}
spec:
  # strategy: RollingUpdate (zero-downtime)
  # --model-control-mode=explicit에서는 Triton이 NFS 디렉토리를 자동 폴링하지 않으므로
  # pod restart 중 NFS partial-read 위험이 없다. 모델 로딩은 Airflow DAG가
  # 명시적으로 Triton API를 호출할 때만 발생한다.
  # maxSurge=1: 새 Pod이 먼저 뜬 후 readinessProbe 통과 후 트래픽 전환
  # maxUnavailable=0: 기존 Pod은 새 Pod 준비 완료까지 유지
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
{{ include "triton.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "triton.labels" . | nindent 8 }}
    spec:
{{- with .Values.podSecurityContext }}
      securityContext:{{ toYaml . | nindent 8 }}
{{- end }}
      containers:
        - name: triton
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
{{- with .Values.securityContext }}
          securityContext:
{{ toYaml . | nindent 12 }}
{{- end }}
          args:
            - tritonserver
            - --model-repository={{ .Values.modelRepository.mountPath }}
            - --model-control-mode=explicit
            - --http-port=8000
            - --grpc-port=8001
            - --metrics-port=8002
          ports:
            - name: http
              containerPort: 8000
            - name: grpc
              containerPort: 8001
            - name: metrics
              containerPort: 8002
{{- with .Values.livenessProbe }}
          livenessProbe:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.readinessProbe }}
          readinessProbe:
{{ toYaml . | nindent 12 }}
{{- end }}
          resources:
{{- if .Values.gpu.enabled }}
{{ toYaml .Values.gpu.resources | nindent 12 }}
{{- else }}
{{ toYaml .Values.resources | nindent 12 }}
{{- end }}
          volumeMounts:
            - name: model-repo
              mountPath: {{ .Values.modelRepository.mountPath }}
{{- if .Values.gpu.enabled }}
      nodeSelector:
{{ toYaml .Values.gpu.nodeSelector | nindent 8 }}
      tolerations:
{{ toYaml .Values.gpu.tolerations | nindent 8 }}
{{- end }}
      volumes:
        - name: model-repo
          persistentVolumeClaim:
            claimName: {{ .Values.modelRepository.pvc.name }}
