apiVersion: apps/v1
kind: Deployment
metadata:
  name: triton
  labels:
{{ include "triton.labels" . | nindent 4 }}
spec:
  # strategy: Recreate (RollingUpdate 불가 이유)
  # Triton은 NFS RWX PVC를 model-repository로 마운트한다.
  # NFS는 파일 잠금(lock) 보장이 약해, 복수 Pod이 동시에 동일 경로를
  # 읽으면서 Airflow가 쓰기 작업(publish) 중일 경우 partial read가 발생할 수 있다.
  # 또한 --model-control-mode=explicit 아래에서 신규 Pod이 기존 Pod과
  # 동시에 model load API를 호출하면 중복 로드 상태가 생긴다.
  # 따라서 기존 Pod을 완전히 종료한 뒤 새 Pod을 시작하는 Recreate를 선택한다.
  # (배포 중 단기 다운타임은 Airflow DAG의 serving_ready_sensor로 흡수)
  strategy:
    type: Recreate
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
{{ include "triton.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
{{ include "triton.labels" . | nindent 8 }}
    spec:
{{- with .Values.podSecurityContext }}
      securityContext:{{ toYaml . | nindent 8 }}
{{- end }}
      containers:
        - name: triton
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
{{- with .Values.securityContext }}
          securityContext:
{{ toYaml . | nindent 12 }}
{{- end }}
          args:
            - tritonserver
            - --model-repository={{ .Values.modelRepository.mountPath }}
            - --model-control-mode=explicit
            - --http-port=8000
            - --grpc-port=8001
            - --metrics-port=8002
          ports:
            - name: http
              containerPort: 8000
            - name: grpc
              containerPort: 8001
            - name: metrics
              containerPort: 8002
{{- with .Values.livenessProbe }}
          livenessProbe:
{{ toYaml . | nindent 12 }}
{{- end }}
{{- with .Values.readinessProbe }}
          readinessProbe:
{{ toYaml . | nindent 12 }}
{{- end }}
          resources:
{{- if .Values.gpu.enabled }}
{{ toYaml .Values.gpu.resources | nindent 12 }}
{{- else }}
{{ toYaml .Values.resources | nindent 12 }}
{{- end }}
          volumeMounts:
            - name: model-repo
              mountPath: {{ .Values.modelRepository.mountPath }}
{{- if .Values.gpu.enabled }}
      nodeSelector:
{{ toYaml .Values.gpu.nodeSelector | nindent 8 }}
      tolerations:
{{ toYaml .Values.gpu.tolerations | nindent 8 }}
{{- end }}
      volumes:
        - name: model-repo
          persistentVolumeClaim:
            claimName: {{ .Values.modelRepository.pvc.name }}
