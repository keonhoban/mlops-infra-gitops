replicaCount: 1

# 배포 전략: Recreate (RollingUpdate 미사용)
# - NFS RWX 공유 model-repository에 복수 Pod 동시 접근 시 partial read 위험
# - explicit model-control-mode에서 중복 load API 호출 방지
# - 배포 중 단기 다운타임은 Airflow의 serving_ready_sensor가 흡수

# ✅ NFS(RWX) model-repo 권한 충돌 최소화
# - 현재 NFS 쪽이 uid=50000, gid=root(0) 형태로 생성된 흔적이 있어서
#   pod도 동일하게 맞추는 게 가장 좋습니다.
podSecurityContext:
  fsGroup: 0
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  runAsUser: 50000
  runAsGroup: 0
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

image:
  repository: nvcr.io/nvidia/tritonserver
  tag: "24.08-py3"

service:
  type: ClusterIP
  ports:
    http: 8000
    grpc: 8001
    metrics: 8002

resources:
  requests:
    cpu: "2"
    memory: "4Gi"
  limits:
    cpu: "4"
    memory: "8Gi"

modelRepository:
  mountPath: /models
  pvc:
    enabled: true
    name: triton-model-repo-pvc

gpu:
  enabled: false    # CPU only (GPU 활성화 시 아래 섹션 주석 해제)
  count: 1

# -----------------------------------------------------------------------
# GPU 서빙 활성화 섹션 (현재 비활성 — cpu-only 환경)
#
# GPU 노드에 Triton을 배포할 경우 아래 설정을 values.yaml에 추가하고
# deployment.yaml의 resources/nodeSelector/tolerations 블록을 활성화한다.
#
# 전제 조건:
#   - NVIDIA device plugin DaemonSet 설치 (nvidia.com/gpu 리소스 등록)
#   - GPU 노드에 label: accelerator=nvidia-gpu
#   - GPU 노드에 taint: nvidia.com/gpu=present:NoSchedule
#
# gpu:
#   enabled: true
#   count: 1                    # Pod당 요청할 GPU 수
#
# resources:
#   requests:
#     cpu: "4"
#     memory: "16Gi"
#     nvidia.com/gpu: "1"       # GPU 요청 (device plugin 필수)
#   limits:
#     cpu: "8"
#     memory: "32Gi"
#     nvidia.com/gpu: "1"       # requests == limits 권장 (GPU 공유 미지원)
#
# nodeSelector:
#   accelerator: nvidia-gpu     # GPU 노드 선택
#
# tolerations:
#   - key: "nvidia.com/gpu"
#     operator: "Exists"
#     effect: "NoSchedule"      # GPU taint 허용
# -----------------------------------------------------------------------

monitoring:
  enabled: true
  scrapeInterval: 30s
