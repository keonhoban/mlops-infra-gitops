replicaCount: 1

# ✅ NFS(RWX) model-repo 권한 충돌 최소화
# - 현재 NFS 쪽이 uid=50000, gid=root(0) 형태로 생성된 흔적이 있어서
#   pod도 동일하게 맞추는 게 가장 좋습니다.
podSecurityContext:
  fsGroup: 0
  fsGroupChangePolicy: OnRootMismatch

securityContext:
  runAsUser: 50000
  runAsGroup: 0
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

image:
  repository: nvcr.io/nvidia/tritonserver
  tag: "24.08-py3"

service:
  type: ClusterIP
  ports:
    http: 8000
    grpc: 8001
    metrics: 8002

resources:
  requests:
    cpu: "2"
    memory: "4Gi"
  limits:
    cpu: "4"
    memory: "8Gi"

modelRepository:
  mountPath: /models
  pvc:
    enabled: true
    name: triton-model-repo-pvc

gpu:
  enabled: false    # CPU only
  count: 1

monitoring:
  enabled: true
  scrapeInterval: 30s
