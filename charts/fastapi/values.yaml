# FastAPI chart default values
# 목표:
# - RollingUpdate 기반 무중단(가까운 수준) 롤아웃
# - K8s probes는 "네트워크/프로세스 가용성" 보장 (/health)
# - /ready 는 "서빙 준비" 게이트로 유지 (Airflow/운영에서 사용)
# - 로그는 stdout 중심(옵션 A: 로그 PVC 제거 전제)

replicaCount: 2
revisionHistoryLimit: 3

image:
  repository: hoizz/fastapi-custom
  tag: ""               # envs/*/fastapi/values.yaml 에서 tag 지정
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

podSecurityContext:
  runAsUser: 2001
  runAsGroup: 2001
  fsGroup: 2001
  fsGroupChangePolicy: OnRootMismatch

# RollingUpdate "무중단" 핵심:
# - maxUnavailable: 0  => 기존 Pod를 내리기 전에 새 Pod가 Ready 되어야 함
# - maxSurge: 1        => 동시에 1개 더 띄워서 교체
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 30

lifecycle:
  preStop:
    exec:
      command: ["/bin/sh", "-lc", "sleep 10"]

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# probes 설계(중요):
# - startup/readiness: /health (라우팅/엔드포인트 보장을 위해 가벼운 체크)
# - liveness: /health (프로세스 생존 체크)
# - /ready 는 "서빙 준비(=Triton 모델 ready 등)" 게이트로 유지하되,
#   K8s probe가 아니라 Airflow/운영 로직에서 사용 권장
probes:
  startupProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 30

  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
    successThreshold: 1

  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 5

pdb:
  enabled: true
  minAvailable: 1

metrics:
  enabled: true
  path: /metrics
  interval: 15s
  scrapeTimeout: 10s

volumeMounts: []
volumes: []

env: {}
envFrom: []
